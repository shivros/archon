name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Baseline CI checks
        shell: bash
        run: scripts/ci_baseline.sh

  linux-quality:
    name: Linux Quality + Race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Quality checks
        shell: bash
        run: scripts/ci_quality.sh

      - name: CI workflow contract checks
        shell: bash
        run: scripts/check_ci_workflow_contract.sh

      - name: Build artifacts workflow contract checks
        shell: bash
        run: scripts/check_build_artifacts_workflow_contract.sh

      - name: Release workflow contract checks
        shell: bash
        run: scripts/check_release_workflow_contract.sh

      - name: Build/release docs contract checks
        shell: bash
        run: scripts/check_docs_build_release_contract.sh

      - name: Workflow contract checker tests
        shell: bash
        run: scripts/test_workflow_contract_checkers.sh

      - name: CI script contract tests
        shell: bash
        run: scripts/test_ci_contracts.sh

      - name: Build artifact script contract tests
        shell: bash
        run: scripts/test_build_artifact_contracts.sh

      - name: Shared artifact input validator contract tests
        shell: bash
        run: scripts/test_validate_artifact_inputs_contracts.sh

      - name: Release input script contract tests
        shell: bash
        run: scripts/test_validate_release_inputs_contracts.sh

      - name: Release target matrix contract tests
        shell: bash
        run: scripts/test_release_targets_contracts.sh

      - name: Release publish script contract tests
        shell: bash
        run: scripts/test_publish_github_release_contracts.sh

      - name: Release tag prep script contract tests
        shell: bash
        run: scripts/test_prepare_release_tag_contracts.sh

      - name: Release tag prep integration tests
        shell: bash
        run: scripts/test_prepare_release_tag_integration.sh

      - name: Build/release docs contract tests
        shell: bash
        run: scripts/test_docs_build_release_contracts.sh

      - name: Lint workflow syntax and semantics
        shell: bash
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          "$(go env GOPATH)/bin/actionlint" .github/workflows/*.yml

      - name: Go race tests (core packages)
        shell: bash
        run: scripts/ci_race.sh
